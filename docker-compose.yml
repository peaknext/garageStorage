# SKH Storage Service - Docker Compose Configuration
# All services including PostgreSQL are containerized

services:
  # ============================================
  # Garage - S3 Compatible Object Storage
  # ============================================
  garage:
    image: dxflrs/garage:v2.1.0
    container_name: garage-storage
    restart: unless-stopped
    ports:
      - "9004:9004" # S3 API
      - "3901:3901" # RPC (internal)
      - "3902:3902" # Web serving
      - "3903:3903" # Admin API
    volumes:
      - ./garage/garage.toml:/etc/garage.toml:ro
      - garage-meta:/var/lib/garage/meta
      - garage-data:/var/lib/garage/data
    environment:
      - RUST_LOG=garage=info
    networks:
      - storage-network
    healthcheck:
      test: ["CMD", "/garage", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================
  # Garage WebUI (Optional)
  # ============================================
  garage-webui:
    image: khairul169/garage-webui:latest
    container_name: garage-webui
    restart: unless-stopped
    ports:
      - "9003:3909"
    environment:
      - API_BASE_URL=http://garage:3903
      - S3_ENDPOINT_URL=http://garage:9004
      - ADMIN_TOKEN=YWRtaW50b2tlbjEyMzQ1Njc4OTBhYmNkZWYxMjM0NTY3ODkw
    volumes:
      - ./garage/garage.toml:/etc/garage.toml:ro
    depends_on:
      garage:
        condition: service_healthy
    networks:
      - storage-network

  # ============================================
  # Redis Cache
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: garage-redis
    restart: unless-stopped
    ports:
      - "9005:9005"
    command: redis-server --port 9005 --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}
    volumes:
      - redis-data:/data
    networks:
      - storage-network
    healthcheck:
      test:
        ["CMD", "redis-cli", "-p", "9005", "-a", "${REDIS_PASSWORD:-redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: garage-postgres
    restart: unless-stopped
    ports:
      - "9006:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: garageStorage
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - storage-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d garageStorage"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Storage API Service (NestJS)
  # ============================================
  storage-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: storage-api
    restart: unless-stopped
    ports:
      - "9001:9001"
    environment:
      - NODE_ENV=production
      - PORT=9001
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/garageStorage
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:9005
      - REDIS_HOST=redis
      - REDIS_PORT=9005
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_password}
      - GARAGE_ENDPOINT=http://garage:9004
      # Use the same IP as API_BASE_URL for network access, or localhost for local-only
      - GARAGE_PUBLIC_ENDPOINT=http://192.168.1.121:9004
      - GARAGE_ADMIN_ENDPOINT=http://garage:3903
      - GARAGE_ADMIN_TOKEN=YWRtaW50b2tlbjEyMzQ1Njc4OTBhYmNkZWYxMjM0NTY3ODkw
      - GARAGE_REGION=garage
      - GARAGE_ACCESS_KEY=${GARAGE_ACCESS_KEY}
      - GARAGE_SECRET_KEY=${GARAGE_SECRET_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - API_BASE_URL=http://192.168.1.121:9001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      garage:
        condition: service_healthy
    networks:
      - storage-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================
  # Admin Frontend (Next.js)
  # ============================================
  admin-ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: storage-admin-ui
    restart: unless-stopped
    ports:
      - "9002:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:9001/api/v1
      - NEXT_PUBLIC_GARAGE_ENDPOINT=http://localhost:9004
    depends_on:
      - storage-api
    networks:
      - storage-network

volumes:
  garage-meta:
  garage-data:
  redis-data:
  postgres-data:

networks:
  storage-network:
    driver: bridge
