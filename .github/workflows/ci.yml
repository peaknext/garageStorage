name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  backend-lint-typecheck:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Generate Prisma Client
        run: |
          echo "Prisma version:"
          npx prisma --version
          echo "--- Running prisma generate ---"
          npx prisma generate 2>&1
          echo "--- Checking output location ---"
          if [ -f src/generated/prisma/index.ts ]; then
            echo "OK: Client found at src/generated/prisma/"
          else
            echo "Not found at src/generated/prisma/, trying --schema flag..."
            npx prisma generate --schema prisma/schema.prisma 2>&1
          fi
          if [ ! -f src/generated/prisma/index.ts ]; then
            echo "FATAL: Prisma client not generated at expected location"
            echo "--- Searching for generated files ---"
            find . -name "index.ts" -path "*/generated/*" 2>/dev/null || echo "No generated index.ts found anywhere"
            find . -path "*/prisma/client*" -name "*.ts" 2>/dev/null | head -10 || echo "No prisma client files found"
            exit 1
          fi
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run build

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Generate Prisma Client
        run: |
          npx prisma generate 2>&1
          if [ ! -f src/generated/prisma/index.ts ]; then
            npx prisma generate --schema prisma/schema.prisma 2>&1
          fi
          test -f src/generated/prisma/index.ts || { echo "FATAL: Prisma client not generated"; exit 1; }
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

      - name: Build
        run: npm run build

      - name: Run Tests
        run: npm run test -- --ci --coverage

      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

  frontend-lint-typecheck:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npx tsc --noEmit

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-lint-typecheck, backend-test, frontend-lint-typecheck]

    steps:
      - uses: actions/checkout@v4

      - name: Build Backend Image
        run: docker build -t skh-storage-api:${{ github.sha }} ./backend

      - name: Build Frontend Image
        run: docker build -t skh-admin-ui:${{ github.sha }} ./frontend
