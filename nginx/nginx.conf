# ===========================================
# SKH Storage - Production Nginx Configuration
# ===========================================
# This file uses ${SERVER_DOMAIN} placeholder which is replaced
# by envsubst at container startup. All other $variables are
# native nginx variables and must NOT be substituted.
# ===========================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format with request timing and correlation ID
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    '$request_time $upstream_response_time '
                    '"$http_x_request_id"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=10r/m;

    # Upstream backends
    upstream storage_api {
        server storage-api:9001;
    }
    upstream admin_ui {
        server admin-ui:3000;
    }

    # ============================================
    # HTTP server - redirect to HTTPS
    # ============================================
    server {
        listen 80;
        server_name _;

        # Health check endpoint (no redirect)
        location /nginx-health {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # Redirect all HTTP to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ============================================
    # HTTPS server - main application
    # ============================================
    server {
        listen 443 ssl;
        http2 on;
        server_name ${SERVER_DOMAIN};

        # SSL Configuration
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_session_tickets off;

        # Security Headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ---- Auth login (rate limit for brute force protection) ----
        # Browsers send OPTIONS preflight + POST per attempt (2 requests each)
        # rate=10r/m + burst=10 allows ~5 rapid login attempts
        location /api/v1/auth/login {
            limit_req zone=login burst=10 nodelay;
            proxy_pass http://storage_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- File upload endpoints (separate rate limit) ----
        location ~ /api/v1/(admin/buckets/.*/files/upload|buckets/.*/files$) {
            limit_req zone=upload burst=5 nodelay;
            client_max_body_size 100M;
            proxy_pass http://storage_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # ---- API endpoints ----
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://storage_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-Id $request_id;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # ---- Health check (no rate limit) ----
        location /health {
            proxy_pass http://storage_api;
            access_log off;
        }

        # ---- Swagger docs ----
        # Uncomment the return 404 line to disable Swagger in production
        location /api/docs {
            # return 404;
            proxy_pass http://storage_api;
            proxy_set_header Host $host;
        }

        # ---- Admin UI (Next.js frontend) ----
        location / {
            proxy_pass http://admin_ui;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ---- Deny access to hidden files ----
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

    # ============================================
    # S3 Proxy (Optional - uncomment to proxy Garage S3 through nginx)
    # ============================================
    # Use this if you want SSL on S3 traffic via s3.yourdomain.com
    # instead of exposing port 9004 directly.
    # Requires: DNS record for s3.yourdomain.com pointing to this server
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name s3.${SERVER_DOMAIN};
    #
    #     ssl_certificate /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #
    #     location / {
    #         proxy_pass http://garage:9004;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #         client_max_body_size 100M;
    #         proxy_read_timeout 300s;
    #         proxy_send_timeout 300s;
    #     }
    # }
}
